def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.otter.chat"
    compileSdkVersion 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.otter.chat"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }

    // Build Rust FFI layer before building APK
    preBuild.dependsOn buildRustLib
}

// Task to compile Rust FFI layer
task buildRustLib(type: Exec) {
    description = "Build Otter Rust FFI library"
    
    // Determine the workspace root (../../)
    def workspaceRoot = rootProject.projectDir.parentFile.parentFile
    def cargoProject = new File(workspaceRoot, "Cargo.toml")
    
    if (!cargoProject.exists()) {
        throw new GradleException("Cargo workspace not found at ${workspaceRoot}. Expected Cargo.toml to exist.")
    }

    // Get Android NDK path
    def ndkDir = android.ndkPath
    if (ndkDir == null || ndkDir.isEmpty()) {
        throw new GradleException(
            "Android NDK not found. Install via Android Studio SDK Manager or set android.ndkPath in local.properties"
        )
    }

    def rustTargets = [
        'aarch64-linux-android': 'arm64-v8a',
        'armv7-linux-androideabi': 'armeabi-v7a',
        'x86_64-linux-android': 'x86_64'
    ]

    rustTargets.each { rustTarget, abiDir ->
        workingDir workspaceRoot
        
        // Set up environment for cross-compilation
        environment 'CARGO_NDK_VERSION', '2.16.0'
        environment 'NDK_HOME', ndkDir
        environment 'CC', "${ndkDir}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
        environment 'AR', "${ndkDir}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
        
        // Compile specific target
        commandLine 'cargo', 'ndk',
            '--android-platform', '21',
            '--output', "${projectDir}/src/main/jniLibs",
            'build', '-p', 'otter-mobile',
            '--lib',
            '--target', rustTarget,
            '--release'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
