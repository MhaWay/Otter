name: otter_mobile
description: "Otter Privacy-Focused Chat - Mobile (Flutter)"

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # FFI for Rust native library
  ffi: ^2.1.0
  
  # Networking & P2P (will be handled by Rust FFI backend)
  dio: ^5.3.0
  
  # State management
  provider: ^6.0.0
  
  # Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0
  
  # Storage
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  
  # UI components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  
  # Authentication
  google_sign_in: ^6.1.0
  firebase_auth: ^4.10.0
  
  # Google Drive integration
  google_sign_in_web: ^0.12.0
  
  # Logging
  logger: ^2.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
